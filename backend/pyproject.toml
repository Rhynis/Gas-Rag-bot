[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "W", "I", "N", "B", "A", "C4", "UP", "RUF", "S", "BLE", "ASYNC"]
ignore = ["S101", "S104", "N818"]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101", "S105", "S106"]
"migrations/*" = ["E501"]
"app/main.py" = ["type-arg"]
"app/core/security_middleware.py" = ["type-arg"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
source = ["app"]
omit = ["tests/*", "migrations/*"]

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "raise NotImplementedError",
  "if TYPE_CHECKING:",
]
