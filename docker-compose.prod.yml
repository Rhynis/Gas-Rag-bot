version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: gasbot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - gasbot-network

  backend:
    build:
      context: ./backend
    container_name: gasbot-backend
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - gasbot-network

  frontend:
    build:
      context: ./frontend
    container_name: gasbot-frontend
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - gasbot-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: gasbot-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gasbot}
      POSTGRES_USER: ${POSTGRES_USER:-gasbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gasbot} -d ${POSTGRES_DB:-gasbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - gasbot-network

  redis:
    image: redis:7-alpine
    container_name: gasbot-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - gasbot-network

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  gasbot-network:
    driver: bridge
