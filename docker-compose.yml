version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gasbot-postgres
    environment:
      POSTGRES_DB: gasbot_dev
      POSTGRES_USER: gasbot
      POSTGRES_PASSWORD: gasbot_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gasbot -d gasbot_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gasbot-network

  redis:
    image: redis:7-alpine
    container_name: gasbot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gasbot-network

volumes:
  postgres_data:
  redis_data:

networks:
  gasbot-network:
    driver: bridge
